<button mat-icon-button [matMenuTriggerFor]="helpMenu" class="help-trigger" type="button">
  <mat-icon>help_outline</mat-icon>
</button>

<mat-menu #helpMenu="matMenu" panelClass="help-bubble-menu">
  <div class="help-content" (click)="$event.stopPropagation()">
    <h3 class="help-title">{{ title() }}</h3>
    
    @for (line of lines(); track line) {
      <p class="help-text" [innerHTML]="line"></p>
    }

    @if (helpUrl()) {
      <hr class="help-divider">
      <button class="btn-docs" (click)="openDocs()">
        <mat-icon>open_in_new</mat-icon>
        <span>Learn more</span>
      </button>
    }
  </div>
</mat-menu>
