<div class="home-card__row">
    <div class="action-with-help">
        <button (click)="onLoad.emit()" [disabled]="isLoading()" class="btn-outline-primary home-card__action-btn">
            @if (isLoading()) {
                <mat-spinner diameter="15"></mat-spinner>
                <span>Loading...</span>
            } @else {
                <span>Load {{ label() }}</span>
            }
        </button>
        
        <hpo-help-button 
            [title]="'Loading the ' + label()" 
            [lines]="helpLines()" 
            [helpUrl]="helpUrl()" />
    </div>
    
    <div class="ontology-status">
        <span [ngClass]="{
            'ontology-status__text--loading': isLoading(), 
            'ontology-status__text--loaded': isLoaded()}" 
            class="ontology-status__text">
            @if(isLoaded()) {
                <mat-icon class="ontology-status__icon">check_circle</mat-icon> 
                {{ statusMessage() }}
                <span class="ontology-status__terms">{{ termCount() }} terms available</span>
            }
        </span>
    </div>
</div>
