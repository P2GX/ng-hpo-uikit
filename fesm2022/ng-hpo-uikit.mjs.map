 <div class="onset-select-container">
  <div class="onset-input-row">
    <select 
      [ngModel]="selectedOnset()"
      (ngModelChange)="onOnsetSelect($event)"
      class="onset-select">
      <option value="" disabled selected hidden>Select onset age...</option>
      <option *ngFor="let option of availableOnsets()" [value]="option">
        {{ option }}
      </option>
    </select>

    <button 
      type="button" 
      class="btn-add-onset" 
      (click)="requestNewOnset.emit()" 
      title="Create new age term">
      + New
    </button>
  </div>
</div>
