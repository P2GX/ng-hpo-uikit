<div class="clinical-text-container">
  <label for="clinical-text" class="hpo-label">Paste clinical text</label>
  <div class="input-section">
    <textarea
      id="clinical-text"
      [(ngModel)]="pastedText"
      rows="15"
      placeholder="Paste here with ctrl-V..."
      class="clinical-textarea"
      [disabled]="isMining()"
    ></textarea>
    <a 
      href="javascript:void(0)" 
      (click)="!isMining() && loadExampleText()" 
      class="example-text-link"
      [class.disabled]="isMining()">
      Load Example Text
    </a>
    
    <div class="actions-footer">
      <button 
        (click)="runTextMining()"  
        class="btn-outline-primary"
        [disabled]="isMining() || !pastedText.trim()">
        {{ isMining() ? 'Processing Text...' : 'Run HPO Text Mining' }}
      </button>
      <button 
        class="btn-outline-cancel" 
        (click)="onCancel()"
        [disabled]="isMining()">
        Cancel
      </button>
    </div>
  </div>
</div>
