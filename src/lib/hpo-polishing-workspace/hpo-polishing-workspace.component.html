<div class="workspace-layout">
  <div class="document-preview-pane">
    <div class="document-preview-pane">
    <hpo-text-mining-container
      [sentences]="localSentences()"
      (deleteHitRequested)="deleteHit($event)"
      [autocompleteProvider]="autocompleteProvider()"
      (segmentsReplaced)="onSegmentsReplaced($event)"
      >
    </hpo-text-mining-container>
</div>
  </div>

  <div class="table-viewport">
    <table class="data-table">
      <thead>
        <tr>
          <th class="col-id">Ontology ID</th>
          <th class="col-label">Phenotypic Term Label</th>
          <th class="col-status">Status</th>
          <th class="col-onset">Onset</th>
          <th class="col-modifiers">Clinical Modifiers</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (rowItem of uniqueTableAnnotations(); track rowItem.termId) {
          <tr 
            hpo-polisher-row
            [annotation]="rowItem"
            [hierarchyProvider]="hierarchyProvider()"
            [availableModifiers]="availableModifiers()"
            (updated)="handleAnnotationUpdate(rowItem, $event)"
            (deleteRequested)="deleteAnnotationEverywhere(rowItem.termId)">
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="empty-table-state">
              No clinical features currently parsed inside this annotation scope.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="workspace-footer">
    @if (autocompleteProvider(); as provider) {
      <div class="autocomplete-injection-box">
        <hpo-ontology-autocomplete
          [inputString]="hpoInputString"
          [autocompleteProvider]="provider"
          (selected)="handleAutocompleteSelection($event)">
        </hpo-ontology-autocomplete>
        <button 
          (click)="injectManualHpoToken()"
          [disabled]="!selectedHpoMatch()"
          class="btn-workspace-add">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>Add Term
        </button>
      </div>
    }
    
    <div class="action-btn-cluster">
      <button class="btn-outline-cancel" (click)="cancel.emit()">Discard</button>
      <button class="btn-outline-primary" (click)="saveAndFinish()">Commit Curation Changes</button>
    </div>
  </div>

</div>
