<div class="modifier-menu-container">
  <div class="modifier-menu-header">
    <span>Select Modifiers</span>
  </div>

  <div class="modifier-options-list">
    <label *ngFor="let option of availableModifiers()" class="modifier-option-item">
      <input 
        type="checkbox"
        [checked]="isModifierSelected(option.id)"
        (change)="onToggleModifier(option.id, $any($event.target).checked)"
        class="modifier-checkbox" />
      <span class="modifier-label">{{ option.label }}</span>
      <span class="modifier-id-badge">{{ option.id }}</span>
    </label>
  </div>

  <div class="modifier-menu-footer">
    <button 
      type="button" 
      class="btn-close-menu" 
      (click)="closeMenu()">
      Done
    </button>
  </div>
</div>
