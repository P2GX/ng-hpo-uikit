<div class="clinical-text-container">
  <label class="label-primary">
    Paste clinical text ...
  </label>
  <div class="input-section">
    <textarea
      [(ngModel)]="pastedText"
      rows="15"
      placeholder="Paste here with ctrl-V..."
      class="clinical-textarea"
      [disabled]="isMining()"
    ></textarea>
    
    <div class="actions-footer">
      <button 
        (click)="runTextMining()"  
        class="btn-outline-primary"
        [disabled]="isMining() || !pastedText.trim()">
        {{ isMining() ? 'Processing Text...' : 'Run HPO Text Mining' }}
      </button>
      <button 
        class="btn-outline-cancel" 
        (click)="onCancel()"
        [disabled]="isMining()">
        Cancel
      </button>
    </div>
  </div>
</div>
