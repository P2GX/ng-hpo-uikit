<dialog 
  #ageSelectorDialog 
  class="compact-dialog-overlay" 
  (click)="onBackdropClick($event)" 
  (cancel)="onCancel()">
  <h2 class="dialog-title">Select Age</h2>

  <div class="dialog-content">
    <div class="dialog-stack">
      @if (existingAgeStrings().length > 0) {
        <div class="selection-section">
          <label class="section-label">Choose Existing</label>
          <div class="age-tag-cloud">
            @for (term of existingAgeStrings(); track term) {
              <button 
                type="button"
                (click)="onSelectExisting(term)"
                class="age-tag">
                {{ term }}
              </button>
            }
          </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">OR CREATE NEW</span>
            <div class="divider-line"></div>
        </div>
      }

      <!-- Manual Entry Layout -->
      <div class="manual-entry">
        <div class="custom-form-field position-relative">
          <label class="field-label" for="new-age-input">New Age String</label>
          <input 
                id="new-age-input"
                type="text"
                class="native-input"
                [ngModel]="customAge()" 
                (ngModelChange)="onInputChange($event)"
                (keyup.enter)="onSubmitCustom()"
                autofocus
                autocapitalize="none"
                spellcheck="false"
                autocomplete="off"
                placeholder="e.g. P35Y">
        @if (showSuggestions() && filteredTerms().length > 0) {
          <ul class="native-autocomplete-list">
            @for (term of filteredTerms(); track term) {
              <li class="autocomplete-option" (click)="onSelectExisting(term)">
                {{ term }}
              </li>
            }
          </ul>
        }
        </div>
        <div class="action-row">
          <button type="button" class="btn-outline-primary" (click)="onSubmitCustom()">Use</button>
          <button type="button" class="btn-outline-cancel" (click)="onCancel()">Cancel</button>
        </div>
      </div>

    </div>
  </div>
</dialog>
