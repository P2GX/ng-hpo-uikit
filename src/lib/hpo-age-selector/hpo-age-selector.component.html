<button
  type="button"
  [class.age-picker-trigger]="selectedOnset()"
  [class.annotation-action]="!selectedOnset()"
  [class.annotation-value-small]="size() === 'small'"
  (click)="openSelectorDialog()">

  @if (selectedOnset()) {
    <span class="age-value">{{ selectedOnset() }}</span>
  } @else {
    +Add Age of Onset
  }
</button>
