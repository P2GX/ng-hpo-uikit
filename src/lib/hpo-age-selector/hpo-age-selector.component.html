<button
  type="button"
  [class]="selectedOnset() ? 'age-picker-trigger' : 'annotation-action'"
  [class.annotation-value-small]="size() === 'small'"
  (click)="openSelectorDialog()">
  {{ selectedOnset() || '+Add Age of Onset' }}
</button>

<hpo-age-selector-dialog
  [currentSelection]="selectedOnset()"
  (selected)="onDialogSelected($event)">
</hpo-age-selector-dialog>
