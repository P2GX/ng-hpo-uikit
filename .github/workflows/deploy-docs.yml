name: Deploy Documentation Site

on:
  push:
    branches:
      - main # Triggers the build sequence automatically on any push to main

permissions:
  contents: write # Allows the deployment token to commit the static assets to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code tree
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup your Node environment using modern Node 22 runtime
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Automatically caches node_modules dependencies between runs

      # 3. Clean-install dependencies exactly as locked in package.json
      - name: Install Dependencies
        run: npm ci

      # 4. Compile the Markdown into production static build files via VitePress
      - name: Build Documentation Site
        run: npm run docs:build

      # 5. Extract and deploy the compiled folder target straight to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist # Points directly to VitePress's compilation target output
          force_orphan: true # overwrite existing README for the gh pages