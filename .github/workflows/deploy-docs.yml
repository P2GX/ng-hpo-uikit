name: Deploy Documentation Site

on:
  push:
    branches:
      - master # Triggers the build sequence automatically on any push to main

permissions:
  contents: write # Allows the deployment token to commit the static assets to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm' # Automatically caches node_modules dependencies between runs

      - name: Install Dependencies
        run: npm ci

      # build files via VitePress
      - name: Build Documentation Site
        run: npm run docs:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist # Points directly to VitePress's compilation target output
          force_orphan: true # overwrite existing README for the gh pages